<title>SoevereinScan — Digitale Soevereiniteit Nederlandse Gemeenten</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0e1a;color:#e0e6f0;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
header{position:relative;z-index:1;text-align:center;padding:32px 20px 16px;background:linear-gradient(180deg,rgba(15,23,42,0.95) 0%,transparent 100%)}
header h1{font-size:2.4rem;font-weight:900;background:linear-gradient(135deg,#60a5fa,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px;margin-bottom:4px}
header p.subtitle{font-size:1rem;color:#94a3b8;font-weight:300;max-width:700px;margin:0 auto}
.dashboard{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:16px 24px 40px;display:flex;flex-direction:column;gap:20px}
.stats-bar{display:flex;gap:12px;flex-wrap:wrap}
.stat-card{flex:1;min-width:130px;background:rgba(30,41,59,0.7);border:1px solid rgba(148,163,184,0.1);border-radius:14px;padding:14px;backdrop-filter:blur(12px)}
.stat-card .label{font-size:0.68rem;text-transform:uppercase;letter-spacing:1.2px;color:#64748b;margin-bottom:4px}
.stat-card .value{font-size:1.5rem;font-weight:800;color:#f1f5f9}
.stat-card .detail{font-size:0.72rem;color:#94a3b8;margin-top:2px}
.main-row{display:grid;grid-template-columns:1fr 370px;gap:20px}
@media(max-width:1100px){.main-row{grid-template-columns:1fr}}
.map-wrap{background:rgba(30,41,59,0.5);border:1px solid rgba(148,163,184,0.1);border-radius:16px;overflow:hidden;min-height:560px;position:relative}
#map{width:100%;height:100%;min-height:560px;background:#0f172a}
.leaflet-container{background:#0f172a!important}
.leaflet-control-zoom{border:1px solid rgba(148,163,184,0.2)!important;border-radius:8px!important;overflow:hidden}
.leaflet-control-zoom a{background:rgba(30,41,59,0.9)!important;color:#94a3b8!important;border-color:rgba(148,163,184,0.1)!important}
.map-legend{position:absolute;bottom:12px;left:12px;z-index:500;background:rgba(15,23,42,0.9);border:1px solid rgba(148,163,184,0.15);border-radius:10px;padding:10px 14px;font-size:0.75rem;backdrop-filter:blur(12px)}
.map-legend h4{font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:6px}
.ml-item{display:flex;align-items:center;gap:8px;padding:2px 0;cursor:pointer;border-radius:4px}
.ml-item:hover{background:rgba(96,165,250,0.08)}.ml-item.dimmed{opacity:0.3}
.ml-swatch{width:16px;height:16px;border-radius:3px;flex-shrink:0}
.ml-label{color:#cbd5e1;font-weight:500}.ml-count{color:#64748b;margin-left:auto;font-size:0.7rem}
.map-info{position:absolute;top:12px;right:12px;z-index:500;background:rgba(15,23,42,0.95);border:1px solid rgba(148,163,184,0.15);border-radius:12px;padding:16px;width:290px;backdrop-filter:blur(12px);font-size:0.85rem}
.map-info h3{font-size:1rem;font-weight:700;color:#f1f5f9;margin-bottom:2px}
.mi-prov{font-size:0.75rem;color:#64748b;margin-bottom:10px}
.mi-score-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.mi-circle{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem;font-weight:800;flex-shrink:0}
.mi-verdict{font-size:0.85rem;font-weight:600}.mi-desc{font-size:0.75rem;color:#64748b}
.mi-row{display:flex;justify-content:space-between;padding:3px 0;font-size:0.8rem}
.mi-row .mi-l{color:#64748b}.mi-row .mi-v{font-weight:600;color:#e2e8f0}
.mi-hr{border:none;border-top:1px solid rgba(148,163,184,0.1);margin:8px 0}
.mi-dist{display:flex;height:8px;border-radius:4px;overflow:hidden;gap:1px;margin:6px 0}
.mi-dist div{height:100%}.mi-url{font-size:0.75rem;color:#60a5fa;word-break:break-all}
.mi-placeholder{color:#475569;font-size:0.85rem;text-align:center;padding:20px 0}
.side-panel{display:flex;flex-direction:column;gap:16px;overflow-y:auto;max-height:600px;padding-right:4px}
.side-panel::-webkit-scrollbar{width:4px}.side-panel::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.3);border-radius:2px}
.panel-card{background:rgba(30,41,59,0.7);border:1px solid rgba(148,163,184,0.1);border-radius:14px;padding:16px;backdrop-filter:blur(12px)}
.panel-card h3{font-size:0.75rem;text-transform:uppercase;letter-spacing:1.2px;color:#64748b;margin-bottom:12px}
.dist-bars{display:flex;align-items:flex-end;gap:6px;height:80px}
.dist-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.dist-bar{width:100%;border-radius:4px 4px 0 0;min-height:2px}
.dist-lbl{font-size:0.6rem;color:#64748b}.dist-cnt{font-size:0.7rem;font-weight:600;color:#e2e8f0}
.prov-row{display:flex;align-items:center;padding:5px 6px;border-radius:6px;cursor:pointer;gap:8px}
.prov-row:hover{background:rgba(96,165,250,0.08)}
.prov-row .pn{flex:1;font-size:0.8rem;font-weight:500}.prov-row .ps{font-size:0.8rem;font-weight:700;width:28px;text-align:right}
.prov-row .pb{width:60px;height:6px;background:rgba(148,163,184,0.1);border-radius:3px;overflow:hidden;margin-left:8px}
.prov-row .pb-fill{height:100%;border-radius:3px}
.tabs{display:flex;gap:3px;margin-bottom:10px;background:rgba(15,23,42,0.4);border-radius:8px;padding:2px}
.tab{flex:1;padding:5px 10px;border-radius:6px;font-size:0.72rem;font-weight:600;text-align:center;cursor:pointer;color:#64748b}
.tab.active{background:rgba(96,165,250,0.15);color:#60a5fa}
.rank-item{display:flex;align-items:center;padding:4px 0;gap:8px}
.rank-item .ri{font-size:0.7rem;font-weight:700;color:#64748b;width:18px;text-align:right}
.rank-item .rn{flex:1;font-size:0.8rem;font-weight:500}.rank-item .rs{font-size:0.8rem;font-weight:700}
.bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.bottom-row{grid-template-columns:1fr}}
.bottom-card{background:rgba(30,41,59,0.7);border:1px solid rgba(148,163,184,0.1);border-radius:14px;padding:16px;backdrop-filter:blur(12px)}
.bottom-card h3{font-size:0.75rem;text-transform:uppercase;letter-spacing:1.2px;color:#64748b;margin-bottom:12px}
.finding-row{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid rgba(148,163,184,0.05);gap:10px}
.f-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:800;flex-shrink:0}
.f-text{flex:1;font-size:0.8rem}.f-count{font-size:0.8rem;font-weight:700;color:#94a3b8}.f-pct{font-size:0.7rem;color:#64748b;width:40px;text-align:right}
.svc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.svc-card{display:flex;align-items:center;gap:8px;padding:8px;background:rgba(15,23,42,0.4);border-radius:8px;border:1px solid rgba(148,163,184,0.06)}
.svc-badge{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:800;flex-shrink:0}
.svc-info{flex:1;min-width:0}.svc-name{font-size:0.8rem;font-weight:600;color:#e2e8f0}.svc-meta{font-size:0.65rem;color:#64748b}
.svc-cnt{text-align:right;flex-shrink:0}.svc-cnt .svc-num{font-size:0.95rem;font-weight:700}.svc-cnt .svc-lbl{font-size:0.6rem;color:#64748b}
.pattern-box{margin-top:14px;padding:10px;background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.12);border-radius:8px}
.pattern-box .pb-title{font-size:0.8rem;font-weight:600;color:#f87171;margin-bottom:4px}
.pattern-box .pb-text{font-size:0.75rem;color:#94a3b8;line-height:1.6}
footer{position:relative;z-index:1;text-align:center;padding:16px;color:#475569;font-size:0.7rem}
footer a{color:#60a5fa}
</style>
</head>

  function showInfo(data,gn){var p=document.getElementById('map-info');if(!data){p.innerHTML='<h3>'+gn+'</h3><p style="color:#64748b;margin-top:8px">Geen data</p>';return}var sl=sealLevel(data.score),s=SEAL[sl],ld=data.level_distribution||{},tot=Object.values(ld).reduce(function(a,b){return a+b},0)||1;p.innerHTML='<h3>'+data.name+'</h3><div class="mi-prov">'+(data.provincie||'')+'</div><div class="mi-score-row"><div class="mi-circle" style="background:'+s.color+'">'+Math.round(data.score)+'</div><div><div class="mi-verdict" style="color:'+s.color+'">SEAL-'+sl+': '+s.label+'</div><div class="mi-desc">Exacte score: '+data.score.toFixed(2)+'</div></div></div><hr class="mi-hr"><div class="mi-row"><span class="mi-l">Hostnames</span><span class="mi-v">'+data.total_hostnames+'</span></div><div class="mi-row"><span class="mi-l">Third-party</span><span class="mi-v">'+data.third_party_hostnames+'</span></div><hr class="mi-hr"><div style="font-size:0.75rem;font-weight:600;margin-bottom:3px">Resources</div><div class="mi-dist">'+[4,3,2,1,0].map(function(l){var c=ld[l]||0,pct=(c/tot)*100;return pct>0?'<div style="width:'+pct+'%;background:'+SEAL[l].color+'" title="SEAL-'+l+': '+c+'"></div>':''}).join('')+'</div><div style="display:flex;gap:6px;font-size:0.65rem;flex-wrap:wrap">'+[4,3,2,1,0].map(function(l){var c=ld[l]||0;return c>0?'<span style="color:'+SEAL[l].color+'">S'+l+':'+c+'</span>':''}).filter(Boolean).join('')+'</div><hr class="mi-hr"><a href="'+(data.final_url||'#')+'" target="_blank" class="mi-url">'+(data.final_url||'').replace('https://','').replace(/\/$/,'')+'</a>'}
  var provData={};scores.forEach(function(s){if(!s.provincie)return;if(!provData[s.provincie])provData[s.provincie]=[];provData[s.provincie].push(s.score)});
  var provList=Object.entries(provData).map(function(e){return{name:e[0],avg:e[1].reduce(function(a,b){return a+b},0)/e[1].length}}).sort(function(a,b){return b.avg-a.avg});
  var sorted=scores.filter(function(s){return s.score!=null}).slice().sort(function(a,b){return b.score-a.score});
  var top10=sorted.slice(0,10),bot10=sorted.slice(-10).reverse(),maxCnt=Math.max.apply(null,counts);
  document.getElementById('side-panel').innerHTML='<div class="panel-card"><h3>Scoreverdeling</h3><div class="dist-bars">'+SEAL.map(function(s,i){return'<div class="dist-col"><div class="dist-cnt">'+counts[i]+'</div><div class="dist-bar" style="height:'+Math.max(3,counts[i]/maxCnt*65)+'px;background:'+s.color+'"></div><div class="dist-lbl">S'+i+'</div></div>'}).join('')+'</div></div><div class="panel-card"><h3>Provincies</h3>'+provList.map(function(p){return'<div class="prov-row" data-prov="'+p.name+'"><span class="pn">'+p.name+'</span><span class="ps" style="color:'+sealColor(p.avg)+'">'+Math.round(p.avg)+'</span><div class="pb"><div class="pb-fill" style="width:'+(p.avg/4*100)+'%;background:'+sealColor(p.avg)+'"></div></div></div>'}).join('')+'</div><div class="panel-card"><div class="tabs" id="rtabs"><div class="tab active" data-t="best">Meest soeverein</div><div class="tab" data-t="worst">Minst soeverein</div></div><div id="rbest">'+top10.map(function(s,i){return'<div class="rank-item"><span class="ri">'+(i+1)+'</span><span class="rn">'+s.name+'</span><span class="rs" style="color:'+sealColor(s.score)+'">'+Math.round(s.score)+'</span></div>'}).join('')+'</div><div id="rworst" style="display:none">'+bot10.map(function(s,i){return'<div class="rank-item"><span class="ri">'+(i+1)+'</span><span class="rn">'+s.name+'</span><span class="rs" style="color:'+sealColor(s.score)+'">'+Math.round(s.score)+'</span></div>'}).join('')+'</div></div>';
  document.querySelectorAll('#rtabs .tab').forEach(function(t){t.addEventListener('click',function(){document.querySelectorAll('#rtabs .tab').forEach(function(x){x.classList.remove('active')});t.classList.add('active');document.getElementById('rbest').style.display=t.dataset.t==='best'?'':'none';document.getElementById('rworst').style.display=t.dataset.t==='worst'?'':'none'})});
  document.querySelectorAll('.prov-row').forEach(function(row){row.addEventListener('mouseenter',function(){var prov=row.dataset.prov;geoLayer.eachLayer(function(l){var d=fuzzyFind(scores,l.feature.properties.statnaam);if(d&&d.provincie===prov){l.setStyle({weight:2,color:'#e2e8f0',fillOpacity:0.95});l.bringToFront()}else l.setStyle({fillOpacity:0.15,opacity:0.15})})});row.addEventListener('mouseleave',function(){geoLayer.setStyle(styleFn);if(selectedLayer){selectedLayer.setStyle({weight:2.5,color:'#fff',fillOpacity:0.95});selectedLayer.bringToFront()}})});
  var topSvc=[{name:'ReadSpeaker',provider:'CDN77',seal:2,type:'Toegankelijkheid',count:145},{name:'Siteimprove',provider:'Cloudflare',seal:1,type:'Analytics',count:135},{name:'SIM-CDN',provider:'Amazon AWS',seal:1,type:'CMS/CDN',count:83},{name:'Bunny Fonts',provider:'Hetzner',seal:4,type:'Fonts',count:66},{name:'Google Tag Manager',provider:'Google',seal:1,type:'Tracking',count:61},{name:'Google Analytics',provider:'Google',seal:1,type:'Analytics',count:53},{name:'Google Fonts',provider:'Google',seal:1,type:'Fonts',count:49},{name:'Monsido',provider:'Google Cloud',seal:1,type:'Tracking',count:33},{name:'Roxit Survey',provider:'Visma Roxit',seal:3,type:'Enquete',count:31},{name:'OBI4wan',provider:'Amazon AWS',seal:1,type:'Chat',count:28},{name:'Font Awesome',provider:'Cloudflare',seal:1,type:'Fonts',count:27},{name:'Matomo Cloud',provider:'Amazon AWS',seal:1,type:'Analytics',count:21},{name:'VGA Chatbot',provider:'LeaseWeb NL',seal:3,type:'Chat',count:21}].sort(function(a,b){return b.count-a.count});
  document.getElementById('svc-section').innerHTML='<h3>Meest voorkomende diensten bij gemeenten</h3><div class="svc-grid">'+topSvc.map(function(s){var c=SEAL[s.seal].color;return'<div class="svc-card"><div class="svc-badge" style="background:'+c+'22;color:'+c+'">S'+s.seal+'</div><div class="svc-info"><div class="svc-name">'+s.name+'</div><div class="svc-meta">'+s.type+' &middot; '+s.provider+'</div></div><div class="svc-cnt"><div class="svc-num" style="color:'+c+'">'+s.count+'</div><div class="svc-lbl">gem.</div></div></div>'}).join('')+'</div><div class="pattern-box"><div class="pb-title">Patroonanalyse</div><div class="pb-text"><strong>Tracking &amp; Analytics:</strong> Google (Tag Manager, Analytics, Fonts) bij 120+ gemeenten (SEAL-1). Siteimprove bij 135 gemeenten via Cloudflare. Monsido tracking op Google Cloud.<br><strong>Hosting/CDN:</strong> Cloudflare meest gebruikte CDN (199 gem.). Amazon AWS host SIM-CDN (83), OBI4wan (28) en Matomo Cloud (21).<br><strong>Positief:</strong> ReadSpeaker (145 gem.) op CDN77 (SEAL-2). Bunny Fonts (66 gem.) soeverein alternatief op Hetzner (SEAL-4). VGA chatbot op LeaseWeb NL (SEAL-3).</div></div>';
  document.getElementById('bottom-row').innerHTML='<div class="bottom-card"><h3>Belangrijkste bevindingen</h3><div class="finding-row"><div class="f-icon" style="background:#15803d22;color:#15803d">S4</div><div class="f-text">Gemeenten <strong>volledig soeverein</strong></div><div class="f-count">'+counts[4]+'</div><div class="f-pct">'+(counts[4]/scores.length*100).toFixed(0)+'%</div></div><div class="finding-row"><div class="f-icon" style="background:#dc262622;color:#dc2626">S0</div><div class="f-text">Gemeenten <strong>SEAL-0/1: onvoldoende</strong></div><div class="f-count">'+(counts[0]+counts[1])+'</div><div class="f-pct">'+((counts[0]+counts[1])/scores.length*100).toFixed(0)+'%</div></div><div class="finding-row"><div class="f-icon" style="background:#60a5fa22;color:#60a5fa">3P</div><div class="f-text"><strong>Third-party hostnames</strong> totaal</div><div class="f-count">'+tp.toLocaleString('nl-NL')+'</div><div class="f-pct">gem. '+(tp/scores.length).toFixed(1)+'</div></div></div><div class="bottom-card"><h3>Resource classificatie</h3><div style="font-size:0.75rem;color:#64748b;margin-bottom:8px">'+totalRes.toLocaleString('nl-NL')+' resources</div>'+[4,3,2,1,0].map(function(l){return'<div class="finding-row"><div class="f-icon" style="background:'+SEAL[l].color+'22;color:'+SEAL[l].color+'">S'+l+'</div><div class="f-text">'+SEAL[l].label+'</div><div class="f-count">'+(totalLd[l]||0).toLocaleString('nl-NL')+'</div><div class="f-pct">'+(totalRes?((totalLd[l]||0)/totalRes*100).toFixed(0)+'%':'-')+'</div></div>'}).join('')+'<div style="margin-top:8px;display:flex;height:12px;border-radius:6px;overflow:hidden">'+[4,3,2,1,0].map(function(l){var p=totalRes?(totalLd[l]||0)/totalRes*100:0;return'<div style="width:'+p+'%;background:'+SEAL[l].color+'"></div>'}).join('')+'</div></div>';
