<!DOCTYPE html>
<html lang="nl" data-base="{{ base }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SoevereinScan{% endblock %}</title>
    <link rel="stylesheet" href="{{ base }}/static/style.css">
</head>
<body>
    <header>
        <h1><a href="{{ base }}/">Soeverein<span style="color:#2ea043">Scan</span></a></h1>
        <p>Inzicht in de digitale afhankelijkheden van uw website</p>
        <a href="{{ base }}/gemeenten" class="help-link" title="Gemeentekaart" style="font-size:0.85rem;color:#2ea043;text-decoration:none;margin-right:8px">Gemeentekaart</a>
        <a href="{{ base }}/hoe-werkt-het" class="help-link" title="Hoe werkt het?"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2ea043" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></a>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>Open source onder <a href="https://joinup.ec.europa.eu/licence/eupl-text-eupl-12">EUPL-1.2</a> | <a href="https://publicvibes.nl">PublicVibes.nl</a></p>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
